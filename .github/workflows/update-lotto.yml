name: 로또 데이터 자동 업데이트

on:
  schedule:
    # 매주 토요일 오후 9시 30분 KST (= 12:30 UTC) 실행
    # 추첨은 토요일 오후 8시 35분 → 여유있게 1시간 후
    - cron: "30 12 * * 6"
  workflow_dispatch: # 수동 실행 버튼도 제공

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests urllib3

      - name: 새 회차 데이터 수집 (번호 + 1등 당첨정보)
        id: fetch_data
        run: |
          python scripts/update_lotto_csv.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: 수집 결과 확인
        run: |
          if git diff --quiet public/lotto_numbers.csv public/lotto_history_details.json 2>/dev/null; then
            echo "📊 변경사항 없음 (이미 최신 상태이거나 API 차단됨)"
          else
            echo "✅ 새 데이터 수집 성공"
            git diff --stat public/lotto_numbers.csv public/lotto_history_details.json
          fi

      - name: 변경사항 확인
        id: check_changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 커밋 & 푸시
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/lotto_numbers.csv public/lotto_history_details.json
          git commit -m "chore: 로또 데이터 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
          echo "🚀 Vercel 자동 배포 시작됨"

      - name: 결과 요약
        if: always()
        run: |
          echo "================================================"
          echo "실행 시각: $(date +'%Y-%m-%d %H:%M:%S UTC')"
          echo "================================================"
          echo ""
          echo "⚠️  GitHub Actions가 dhlottery API 차단을 받는 경우:"
          echo "   → 로컬 PC에서 '자동업데이트.bat' 실행 필요"
          echo "   → Windows 작업 스케줄러로 자동화 가능"
